# Daml Script TEST package for sage-canton.
#
# Kept separate from the production `sage-canton` package so the uploaded TaskEscrow DAR
# carries ONLY the splice-api-token-*-v1 interfaces — no daml-script / splice-amulet /
# token-standard-test bloat. This package data-depends on the production DAR and adds the
# test-only dependencies. Built/tested together with production via the repo-root
# `multi-package.yaml` (`dpm build --all`, `dpm test --all`). This DAR is never uploaded.
#
# LF 2.2: splice-amulet + splice-token-standard-test are LF 2.2; must match.
sdk-version: 3.4.11
name: sage-canton-tests
source: Tests
version: 0.1.4
dependencies:
  - daml-prim
  - daml-stdlib
  - daml-script
data-dependencies:
  # the production package under test (built first by multi-package). Keep this version in
  # sync with daml.yaml's `version` when it bumps.
  - ../.daml/dist/sage-canton-0.1.4.dar
  # CIP-0056 token-standard interfaces (the tests import several directly)
  - ../daml/vendor/splice-api-token-metadata-v1-1.0.0.dar
  - ../daml/vendor/splice-api-token-holding-v1-1.0.0.dar
  - ../daml/vendor/splice-api-token-allocation-v1-1.0.0.dar
  - ../daml/vendor/splice-api-token-allocation-request-v1-1.0.0.dar
  - ../daml/vendor/splice-api-token-allocation-instruction-v1-1.0.0.dar
  - ../daml/vendor/splice-api-token-transfer-instruction-v1-1.0.0.dar
  # test-only: concrete Amulet impl + mock registry harness (LF 2.2)
  - ../daml/vendor/splice-amulet-0.1.14.dar
  - ../daml/vendor/splice-token-standard-test-1.0.6.dar
build-options:
  - --target=2.2
