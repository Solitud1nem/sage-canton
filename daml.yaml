# Daml project file for sage-canton.
#
# Pinned to SDK 3.4.11 to match the cn-quickstart LocalNet runtime AND the daml-script
# version used by the splice token-standard test harness (the mock Amulet registry's
# `Script` type must unify with ours — see ADR-0017 / toolchain-and-references.md §3).
# When targeting TestNet/DevNet, bump to the SDK paired with that network (3.5.1 as of
# 2026-06) and re-verify against the Version Compatibility dashboard.
#
# LF target 2.2: kept (not 2.1) so the package id stays stable vs the DAR already uploaded
# to LocalNet; the bare CIP-0056 interfaces this package codes against are LF 2.1
# (forward-compatible). A 2.2 package may depend on the 2.1 interface DARs.
#
# This is the PRODUCTION package: only the TaskEscrow + AgentRegistry templates and the
# splice-api-token-*-v1 interfaces — NO daml-script / splice-amulet / token-standard-test,
# so the uploaded DAR doesn't bloat the participant package store. The Daml Script tests
# (which DO need those) live in the sibling `daml-tests/` package; build/test both via the
# `multi-package.yaml` at the repo root (`dpm build --all`, `dpm test --all`).
sdk-version: 3.4.11
name: sage-canton
source: daml
version: 0.2.1
dependencies:
  - daml-prim
  - daml-stdlib
data-dependencies:
  # CIP-0056 token-standard interfaces — what the TaskEscrow contract codes against (LF 2.1).
  # Only the ones TaskEscrow actually imports; allocation-instruction / transfer-instruction
  # are test-only (used by daml-tests, not the production contract).
  - daml/vendor/splice-api-token-metadata-v1-1.0.0.dar
  - daml/vendor/splice-api-token-holding-v1-1.0.0.dar
  - daml/vendor/splice-api-token-allocation-v1-1.0.0.dar
  - daml/vendor/splice-api-token-allocation-request-v1-1.0.0.dar
build-options:
  - --target=2.2
