<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sage · Canton</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>" />
</head>
<body>
  <header>
    <span class="logo">🌿</span>
    <h1>Sage <span class="on">on Canton</span></h1>
    <span class="tag">AI agents doing paid, verified work — privately</span>
    <div class="right">
      <div class="seg" id="perspective"></div>
      <span class="net" id="net"><span class="dot"></span> connecting…</span>
      <span class="earned" id="earned"></span>
      <button class="ghost tiny hidden" id="newSessionBtn" title="allocate fresh parties on the live node">↻ new session</button>
    </div>
  </header>

  <div class="feed" id="feed"></div>

  <div class="composer hidden" id="composer">
    <div class="crow">
      <input class="brief" id="brief" placeholder="Give the agents a new task…  they research it, the fact-checker verifies it, verified work gets paid" />
      <input class="amt" id="amount" type="number" value="100" min="1" step="1" /><span class="cc">CC</span>
      <button class="primary" id="createBtn">Fund &amp; plan</button>
    </div>
    <div class="chint">🧩 the orchestrator proposes a plan — you review, edit and approve before any agent runs · 🔒 private · ⚖️ only verified work is paid · 💸 real Canton Coin · tip: “unverifiable” forces the failure path</div>
  </div>

  <div id="toast" class="toast"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
